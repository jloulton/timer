<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contraction Timer</title>
<style>
  :root {
    --bg: #F6F5F1;
    --ink: #2B2A28;
    --muted: #8A8780;
    --line: #E2DFD6;
    --green: #D7E8D4;
    --green-ink: #2F6B3C;
    --start: #3D6B4F;
    --stop: #B4543A;
    --reset: #A39E91;
    --accent: #E7B75A;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }

  header {
    margin-bottom: 22px;
  }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 22px 0 18px;
  }

  button {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    padding: 16px 10px;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    box-shadow: 0 2px 0 rgba(0,0,0,0.08);
  }

  button:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }

  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  #startBtn { background: var(--start); color: #fff; }
  #stopBtn  { background: var(--stop); color: #fff; }
  #resetBtn { background: var(--card); color: var(--ink); border: 1px solid var(--line); }

  .status {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 22px;
    font-size: 0.92rem;
    color: var(--muted);
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--reset);
    flex-shrink: 0;
  }

  .status.running .dot {
    background: var(--start);
    box-shadow: 0 0 0 0 rgba(61,107,79,0.5);
    animation: pulse 1.6s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(61,107,79,0.45); }
    70%  { box-shadow: 0 0 0 7px rgba(61,107,79,0); }
    100% { box-shadow: 0 0 0 0 rgba(61,107,79,0); }
  }

  .status.running { color: var(--start); }

  .table-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-scroll {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    min-width: 480px;
  }

  th, td {
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
  }

  th {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    font-weight: 600;
  }

  td {
    border-bottom: 1px solid var(--line);
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  .empty-row td {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 28px 12px;
    white-space: normal;
  }

  .cell-green {
    background: var(--green);
    color: var(--green-ink);
    font-weight: 600;
    border-radius: 6px;
  }

  .pending {
    color: var(--muted);
    font-style: italic;
  }

  .export-row {
    margin-top: 18px;
    display: flex;
    justify-content: flex-end;
  }

  #exportBtn {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    box-shadow: none;
    font-weight: 500;
    font-size: 0.88rem;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #exportBtn:hover { border-color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.88rem;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(43,42,40,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    z-index: 10;
  }

  .modal-backdrop.show {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: var(--card);
    border-radius: 12px;
    padding: 22px;
    max-width: 320px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  }

  .modal p {
    margin: 0 0 18px;
    font-size: 0.96rem;
    line-height: 1.4;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .modal-actions button {
    flex: 1;
    padding: 12px;
  }

  #cancelReset { background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
  #confirmReset { background: var(--stop); color: #fff; }

  @media (max-width: 380px) {
    .controls { gap: 8px; }
    button { padding: 14px 6px; font-size: 0.92rem; }
    th, td { padding: 8px 8px; font-size: 0.82rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Contraction Timer</h1>
  </header>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div class="status" id="statusBar">
    <span class="dot"></span>
    <span id="statusText">Ready to start</span>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Start Time</th>
            <th>Stop Time</th>
            <th>Duration</th>
            <th>Gap</th>
          </tr>
        </thead>
        <tbody id="logBody">
          <tr class="empty-row" id="emptyRow">
            <td colspan="4">No entries yet. Press Start to begin a session.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="export-row">
    <button id="exportBtn">Copy table for spreadsheet</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <p>This will permanently delete all logged entries. Are you sure?</p>
    <div class="modal-actions">
      <button id="cancelReset">Cancel</button>
      <button id="confirmReset">Reset</button>
    </div>
  </div>
</div>

<script>
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const resetBtn = document.getElementById('resetBtn');
  const logBody = document.getElementById('logBody');
  const emptyRow = document.getElementById('emptyRow');
  const statusBar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  const modalBackdrop = document.getElementById('modalBackdrop');
  const cancelReset = document.getElementById('cancelReset');
  const confirmReset = document.getElementById('confirmReset');
  const exportBtn = document.getElementById('exportBtn');
  const toast = document.getElementById('toast');

  // entries: { startTime: Date, stopTime: Date|null }
  let entries = [];
  let currentRow = null;

  function pad(n) { return n.toString().padStart(2, '0'); }

  function formatTime(date) {
    return `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
  }

  function formatDuration(ms) {
    const totalSeconds = Math.round(ms / 1000);
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    if (h > 0) return `${h}h ${pad(m)}m ${pad(s)}s`;
    if (m > 0) return `${m}m ${pad(s)}s`;
    return `${s}s`;
  }

  function updateStatus() {
    if (currentRow) {
      statusBar.classList.add('running');
      statusText.textContent = 'Timer running…';
    } else {
      statusBar.classList.remove('running');
      statusText.textContent = entries.length ? 'Ready to start' : 'Ready to start';
    }
  }

  function buildRow(entry, index) {
    const tr = document.createElement('tr');

    const startTd = document.createElement('td');
    startTd.textContent = formatTime(entry.startTime);

    const stopTd = document.createElement('td');
    stopTd.textContent = '—';
    stopTd.classList.add('pending');

    const durTd = document.createElement('td');
    durTd.textContent = '—';
    durTd.classList.add('pending');

    const gapTd = document.createElement('td');
    if (index === 0) {
      gapTd.textContent = '—';
    } else {
      const prevStop = entries[index - 1].stopTime;
      if (prevStop) {
        const gapMs = entry.startTime - prevStop;
        gapTd.textContent = formatDuration(gapMs);
        if (gapMs <= 5 * 60 * 1000) gapTd.classList.add('cell-green');
      } else {
        gapTd.textContent = '—';
      }
    }

    tr.appendChild(startTd);
    tr.appendChild(stopTd);
    tr.appendChild(durTd);
    tr.appendChild(gapTd);

    return { tr, stopTd, durTd };
  }

  function refreshEmptyRow() {
    emptyRow.style.display = entries.length ? 'none' : '';
  }

  startBtn.addEventListener('click', () => {
    const now = new Date();
    const entry = { startTime: now, stopTime: null };
    entries.push(entry);
    const index = entries.length - 1;
    const { tr, stopTd, durTd } = buildRow(entry, index);
    logBody.appendChild(tr);
    currentRow = { entry, stopTd, durTd };
    refreshEmptyRow();
    updateStatus();

    startBtn.disabled = true;
    stopBtn.disabled = false;
  });

  stopBtn.addEventListener('click', () => {
    if (!currentRow) return;
    const now = new Date();
    currentRow.entry.stopTime = now;

    currentRow.stopTd.textContent = formatTime(now);
    currentRow.stopTd.classList.remove('pending');

    const durationMs = now - currentRow.entry.startTime;
    currentRow.durTd.textContent = formatDuration(durationMs);
    currentRow.durTd.classList.remove('pending');
    if (durationMs <= 60 * 1000) currentRow.durTd.classList.add('cell-green');

    currentRow = null;
    updateStatus();

    startBtn.disabled = false;
    stopBtn.disabled = true;
  });

  resetBtn.addEventListener('click', () => {
    modalBackdrop.classList.add('show');
  });

  cancelReset.addEventListener('click', () => {
    modalBackdrop.classList.remove('show');
  });

  confirmReset.addEventListener('click', () => {
    entries = [];
    currentRow = null;
    logBody.querySelectorAll('tr:not(#emptyRow)').forEach(tr => tr.remove());
    refreshEmptyRow();
    updateStatus();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    modalBackdrop.classList.remove('show');
    showToast('All entries cleared');
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  exportBtn.addEventListener('click', async () => {
    if (!entries.length) {
      showToast('No data to export');
      return;
    }

    const rows = [['Start Time', 'Stop Time', 'Duration', 'Gap']];
    entries.forEach((entry, index) => {
      const start = formatTime(entry.startTime);
      const stop = entry.stopTime ? formatTime(entry.stopTime) : '';
      const duration = entry.stopTime ? formatDuration(entry.stopTime - entry.startTime) : '';
      let gap = '';
      if (index > 0 && entries[index - 1].stopTime) {
        gap = formatDuration(entry.startTime - entries[index - 1].stopTime);
      }
      rows.push([start, stop, duration, gap]);
    });

    const tsv = rows.map(r => r.join('\t')).join('\n');

    try {
      await navigator.clipboard.writeText(tsv);
      showToast('Copied to clipboard');
    } catch (err) {
      // Fallback for environments without clipboard API
      const textarea = document.createElement('textarea');
      textarea.value = tsv;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('Copied to clipboard');
    }
  });

  updateStatus();
</script>
</body>
</html>
